name: mostbyte_print
description: Package for printing reciept by ethernet interface without driver
version: 0.0.1
homepage: https://github.com/mostbyte/mostbyte_print.git
publish_to: none
environment:
  sdk: '>=3.1.3 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_esc_pos_network: ^1.0.3
  usb_esc_printer_windows: 
    path: ./package/usb_esc_printer_windows
  charset_converter: ^2.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  
flutter:
  assets:
    - packages/mostbyte_print/esc_pos/resources/capabilities.json